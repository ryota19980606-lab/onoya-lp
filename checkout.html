<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>購入手続き | 肉屋のごちそう 大野屋</title>
    <meta name="description" content="配送先、支払い、ギフト指定を確認する購入手続きページです。">
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <header class="site-header" id="top">
      <div class="announcement">創業昭和25年、肉を見続けて七十六年。職人の目利きが作るごちそうを全国へ。</div>
      <div class="header-inner">
        <a class="brand" href="index.html" aria-label="肉屋のごちそう 大野屋 トップへ"><span class="brand-mark" aria-hidden="true"><img src="assets/logo-onoya.jpg" alt=""></span><span class="brand-copy"><span class="brand-small">肉屋のごちそう</span><span class="brand-name">大野屋</span></span></a>
        <nav class="main-nav" aria-label="メインナビゲーション"><a href="index.html">トップ</a><a href="products.html">商品一覧</a><a href="gift.html">ギフトセット</a><a href="about.html">大野屋について</a><a href="guide.html">ご利用ガイド</a></nav>
        <div class="header-actions" aria-label="アカウントメニュー"><a href="login.html">ログイン</a><a href="register.html">会員登録</a><a class="cart-link" href="cart.html">カート<span>3</span></a></div>
      </div>
    </header>
    <main>
      <div class="breadcrumb"><a href="index.html">トップ</a><span>/</span><a href="cart.html">カート</a><span>/</span><span>購入手続き</span></div>
      <section class="page-section">
        <div class="checkout-layout">
          <form class="form-panel">
            <p class="eyebrow">購入手続き</p>
            <h1 class="section-title">購入手続き</h1>
            <div class="form-grid">
              <div class="field"><label for="name">お届け先のお名前</label><input id="name" type="text" placeholder="大野 太郎"></div>
              <div class="field"><label for="address">お届け先住所</label><textarea id="address" placeholder="郵便番号、都道府県、市区町村、番地"></textarea></div>
              <div class="field"><label for="date">配送希望日</label><select id="date"><option>指定なし</option><option>最短で届ける</option><option>希望日を指定する</option></select></div>
              <div class="field"><label for="payment">支払い方法</label><select id="payment"><option>クレジットカード</option><option>銀行振込</option><option>代金引換</option></select></div>
              <div class="field"><label for="gift">ギフト指定</label><select id="gift"><option>指定なし</option><option>熨斗あり</option><option>メッセージカードあり</option></select></div>
              <button class="button primary" type="button">注文内容を確認する</button>
            </div>
            <p class="mock-note">オンライン決済と注文確定機能は準備中です。正式なご注文はお問い合わせください。</p>
          </form>
          <aside class="panel order-summary">
            <h2>注文サマリー</h2>
            <div class="summary-row"><span>肉屋の牛100%ハンバーグ ×2</span><strong>1,760円</strong></div>
            <div class="summary-row"><span>黒箱ギフトセット ×1</span><strong>5,980円</strong></div>
            <div class="summary-row"><span>送料</span><strong>1,100円</strong></div>
            <div class="summary-row total"><span>合計</span><strong>8,840円</strong></div>
          </aside>
        </div>
      </section>
    </main>
    <footer class="site-footer"><a class="brand footer-brand" href="index.html"><span class="brand-mark" aria-hidden="true"><img src="assets/logo-onoya.jpg" alt=""></span><span class="brand-copy"><span class="brand-small">肉屋のごちそう</span><span class="brand-name">大野屋</span></span></a><nav class="footer-links" aria-label="フッターナビ"><a href="faq.html">よくある質問・お問い合わせ</a><a href="legal.html">特定商取引法・規約</a><a href="cart.html">カート</a></nav><small>&copy; 肉屋のごちそう 大野屋</small></footer>
  </body>
</html>
