<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>会員登録 | 肉屋のごちそう 大野屋</title>
    <meta name="description" content="大野屋ECの会員登録画面モックです。">
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <header class="site-header" id="top">
      <div class="announcement">創業昭和25年、肉を見続けて七十六年。職人の目利きが作るごちそうを全国へ。</div>
      <div class="header-inner">
        <a class="brand" href="index.html" aria-label="肉屋のごちそう 大野屋 トップへ"><span class="brand-mark" aria-hidden="true">大</span><span class="brand-copy"><span class="brand-small">肉屋のごちそう</span><span class="brand-name">大野屋</span></span></a>
        <nav class="main-nav" aria-label="メインナビゲーション"><a href="index.html">トップ</a><a href="products.html">商品一覧</a><a href="gift.html">ギフトセット</a><a href="about.html">大野屋について</a><a href="guide.html">ご利用ガイド</a></nav>
        <div class="header-actions" aria-label="アカウントメニュー"><a href="login.html">ログイン</a><a href="register.html">会員登録</a><a class="cart-link" href="cart.html">カート<span>3</span></a></div>
      </div>
    </header>
    <main>
      <div class="breadcrumb"><a href="index.html">トップ</a><span>/</span><span>会員登録</span></div>
      <section class="page-section">
        <form class="form-panel">
          <p class="eyebrow">会員登録</p>
          <h1 class="section-title">会員登録</h1>
          <div class="grid grid-2">
            <div class="field"><label for="name">お名前</label><input id="name" type="text" placeholder="大野 太郎"></div>
            <div class="field"><label for="kana">ふりがな</label><input id="kana" type="text" placeholder="おおの たろう"></div>
            <div class="field"><label for="email">メールアドレス</label><input id="email" type="email" placeholder="sample@example.com"></div>
            <div class="field"><label for="tel">電話番号</label><input id="tel" type="tel" placeholder="090-0000-0000"></div>
            <div class="field"><label for="password">パスワード</label><input id="password" type="password" placeholder="********"></div>
            <div class="field"><label for="zipcode">郵便番号</label><input id="zipcode" type="text" placeholder="000-0000"></div>
          </div>
          <div class="hero-actions"><button class="button primary" type="button">登録内容を確認する</button><a class="button outline" href="login.html">ログインへ</a></div>
          <p class="mock-note">会員登録機能は準備中です。公開まで今しばらくお待ちください。</p>
        </form>
      </section>
    </main>
    <footer class="site-footer"><a class="brand footer-brand" href="index.html"><span class="brand-mark" aria-hidden="true">大</span><span class="brand-copy"><span class="brand-small">肉屋のごちそう</span><span class="brand-name">大野屋</span></span></a><nav class="footer-links" aria-label="フッターナビ"><a href="faq.html">よくある質問・お問い合わせ</a><a href="legal.html">特定商取引法・規約</a><a href="cart.html">カート</a></nav><small>&copy; 肉屋のごちそう 大野屋</small></footer>
  </body>
</html>
